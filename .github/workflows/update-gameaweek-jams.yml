name: Update One Game a Week jams

on:
  schedule:
    - cron: "37 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh jam data
        run: node scripts/update-gameaweek-jams.mjs

      - name: Commit jam data
        run: |
          if git diff --quiet -- content/one-game-a-week-jams.json; then
            echo "No jam changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/one-game-a-week-jams.json
          git commit -m "chore: update One Game a Week jams"
          git push
